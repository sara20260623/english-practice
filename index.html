<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="data:application/json,{%22name%22:%22职场英语练习%22,%22short_name%22:%22英语练习%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f0f4f8%22,%22theme_color%22:%224a90d9%22}">
<title>英语口语练习 – 职场场景</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:1.4rem;color:#1a202c;margin-bottom:16px}
.scenes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:700px;margin-bottom:20px}
.scene-btn{padding:20px 14px 16px;border:2px solid #e2e8f0;border-radius:14px;background:#fff;cursor:pointer;text-align:center;transition:.15s}
.scene-btn:hover{border-color:#4a90d9;background:#ebf4ff}
.scene-btn.active{border-color:#4a90d9;background:#ebf4ff}
.scene-btn .icon{font-size:2rem}
.scene-btn .label{font-size:.88rem;font-weight:600;color:#2d3748;margin-top:8px}
.scene-btn .desc{font-size:.75rem;color:#718096;margin-top:4px}
.chat-box{width:100%;max-width:700px;background:#fff;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:flex;flex-direction:column;height:520px}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:78%;padding:11px 15px;border-radius:16px;font-size:.9rem;line-height:1.6}
.msg.bot{background:#f0f4f8;color:#2d3748;align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:#4a90d9;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.hint{background:#fffbeb;color:#92400e;align-self:flex-start;font-size:.8rem;border:1px solid #fde68a;border-radius:10px}
.msg.bot .speak-btn{background:none;border:none;cursor:pointer;font-size:.85rem;padding:0 0 0 4px;opacity:.5;vertical-align:middle}
.msg.bot .speak-btn:hover{opacity:1}
.msg.bot .zh{font-size:.78rem;color:#718096;margin-top:6px;padding-top:6px;border-top:1px solid #d1d9e0}
.input-area{padding:12px 14px;border-top:1px solid #e2e8f0;display:flex;gap:8px;align-items:flex-end;background:#fafbfc;border-radius:0 0 16px 16px}
textarea{flex:1;border:1.5px solid #cbd5e0;border-radius:10px;padding:9px 13px;font-size:.9rem;resize:none;outline:none;height:42px;max-height:100px;background:#fff}
textarea:focus{border-color:#4a90d9;box-shadow:0 0 0 3px rgba(74,144,217,.12)}
.send-btn{padding:10px 20px;background:#4a90d9;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:.9rem;white-space:nowrap;height:42px;font-weight:600}
.send-btn:hover{background:#357abd}
.hint-btn{padding:6px 12px;background:#fef9c3;border:1px solid #fde047;border-radius:8px;font-size:.78rem;cursor:pointer;color:#854d0e}
.hint-btn:hover{background:#fef08a}
.mic-btn{padding:10px 14px;background:#fff;border:1.5px solid #cbd5e0;border-radius:10px;cursor:pointer;font-size:1rem;height:42px}
.mic-btn:hover{background:#f0f4f8}
.mic-btn.recording{background:#fee2e2;border-color:#f87171;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.toolbar{padding:10px 14px;border-bottom:1px solid #f0f4f8;display:flex;gap:8px;align-items:center;background:#f7fafc;border-radius:16px 16px 0 0}
.toolbar span{font-size:.85rem;color:#2d3748;font-weight:600}
.restart-btn{margin-left:auto;padding:5px 12px;font-size:.75rem;background:#fff;border:1.5px solid #cbd5e0;border-radius:8px;cursor:pointer;color:#718096}
.restart-btn:hover{background:#f0f4f8}
.tab-bar{display:flex;gap:8px;width:100%;max-width:700px;margin-bottom:12px;flex-wrap:wrap}
.tab-btn{padding:8px 16px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:.85rem;color:#4a5568}
.tab-btn.active{border-color:#4a90d9;background:#ebf4ff;color:#2b6cb0;font-weight:600}
.panel{width:100%;max-width:700px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:16px;display:none}
.panel.visible{display:block}
.vocab-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.vocab-search{flex:1;min-width:120px;border:1px solid #cbd5e0;border-radius:8px;padding:7px 12px;font-size:.85rem;outline:none}
.vocab-search:focus{border-color:#4a90d9}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.cat-btn{padding:4px 10px;border:1px solid #e2e8f0;border-radius:20px;background:#f7fafc;cursor:pointer;font-size:.75rem;color:#4a5568;white-space:nowrap}
.cat-btn.active{border-color:#4a90d9;background:#ebf4ff;color:#2b6cb0;font-weight:600}
/* 测验模式 */
.quiz-box{max-width:700px;width:100%;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:24px;text-align:center}
.quiz-zh{font-size:1.5rem;font-weight:700;color:#1a202c;margin-bottom:24px}
.quiz-input{width:100%;border:2px solid #cbd5e0;border-radius:8px;padding:10px 14px;font-size:1rem;outline:none;margin-bottom:12px}
.quiz-input:focus{border-color:#4a90d9}
.quiz-result{font-size:1.1rem;font-weight:600;margin:12px 0}
.quiz-answer{font-size:.9rem;color:#718096;margin-bottom:16px}
.quiz-btn{padding:10px 24px;background:#4a90d9;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.95rem;margin:4px}
.quiz-btn:hover{background:#357abd}
.quiz-btn.secondary{background:#f7fafc;color:#4a5568;border:1px solid #cbd5e0}
.quiz-btn.secondary:hover{background:#e2e8f0}
/* 跟读模式 */
.repeat-card{max-width:700px;width:100%;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:24px;text-align:center}
.repeat-en{font-size:1.3rem;font-weight:700;color:#1a202c;margin-bottom:6px}
.repeat-zh{font-size:.9rem;color:#718096;margin-bottom:16px}
.repeat-eg{font-size:.85rem;color:#4a90d9;font-style:italic;margin-bottom:20px}
.repeat-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.repeat-result{font-size:1rem;font-weight:600;padding:10px 16px;border-radius:8px;margin-top:8px;display:none}
.repeat-result.good{background:#dcfce7;color:#166534}
.repeat-result.ok{background:#fef9c3;color:#854d0e}
.repeat-result.bad{background:#fee2e2;color:#991b1b}
.vocab-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.vocab-section{grid-column:1/-1;font-size:.8rem;font-weight:700;color:#4a5568;padding:8px 4px 2px;border-bottom:2px solid #e2e8f0;margin-top:6px}
.vocab-card{border:1px solid #e2e8f0;border-radius:8px;padding:12px;cursor:pointer;transition:.15s}
.vocab-card:hover{border-color:#4a90d9;background:#f7fbff}
.vocab-card .en{font-weight:600;color:#1a202c;font-size:.9rem}
.vocab-card .zh{font-size:.78rem;color:#718096;margin-top:2px}
.vocab-card .eg{font-size:.75rem;color:#4a90d9;margin-top:4px;font-style:italic}
.wordbook{display:flex;flex-direction:column;gap:8px}
.wordbook-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f7fafc;border-radius:8px;font-size:.85rem}
.wordbook-item .del-btn{background:none;border:none;cursor:pointer;color:#e53e3e;font-size:.8rem}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-item{padding:8px 12px;background:#f7fafc;border-radius:8px;font-size:.82rem;color:#4a5568}
.history-item .score{font-weight:600;margin-right:6px}
.history-item.good .score{color:#166534}
.history-item.ok .score{color:#854d0e}
.history-item.bad .score{color:#991b1b}
.save-word-btn{background:none;border:1px solid #cbd5e0;border-radius:4px;padding:2px 6px;font-size:.72rem;cursor:pointer;color:#718096;margin-left:6px}
.save-word-btn:hover{background:#ebf4ff;border-color:#4a90d9;color:#2b6cb0}
/* 音标学习 */
.phonics-layout{display:flex;gap:12px;flex-wrap:wrap}
.phonics-sidebar{width:200px;min-width:140px;display:flex;flex-direction:column;gap:6px;max-height:560px;overflow-y:auto}
.phonics-main{flex:1;min-width:260px}
@media(max-width:600px){
  .phonics-layout{flex-direction:column}
  .phonics-sidebar{width:100%;max-height:none;flex-direction:row;flex-wrap:wrap;overflow-y:visible}
  .phonics-cat-btn{font-size:.75rem;padding:5px 8px}
}
.phonics-cat-btn{padding:7px 10px;border:1px solid #e2e8f0;border-radius:8px;background:#f7fafc;cursor:pointer;font-size:.82rem;text-align:left;color:#4a5568}
.ph-grp-hdr{font-size:.72rem;font-weight:700;padding:6px 4px 2px;letter-spacing:.5px}
.ph-grp-sub{font-size:.68rem;color:#a0aec0;padding:2px 4px 3px}
.phonics-cat-btn.active{border-color:#4a90d9;background:#ebf4ff;color:#2b6cb0;font-weight:600}
.phonics-card{background:#f7fafc;border-radius:12px;padding:16px;margin-bottom:12px}
.phonics-symbol{font-size:2.2rem;font-weight:800;color:#2b6cb0;display:inline-block;margin-right:8px}
.phonics-name{font-size:.85rem;color:#718096}
.phonics-desc{font-size:.85rem;color:#4a5568;margin:6px 0 10px}
.phonics-words{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.phonics-word{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:.85rem}
.phonics-word .pw-en{font-weight:700;color:#1a202c}
.phonics-word .pw-sym{font-size:.75rem;color:#4a90d9}
.phonics-word .pw-zh{font-size:.75rem;color:#718096}
.phonics-sentences{display:flex;flex-direction:column;gap:8px}
.phonics-sent{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:.85rem}
.phonics-sent .ps-en{font-weight:600;color:#1a202c;margin-bottom:2px}
.phonics-sent .ps-zh{font-size:.78rem;color:#718096;margin-bottom:6px}
.phonics-result{font-size:.82rem;font-weight:600;padding:4px 8px;border-radius:6px;margin-top:4px;display:none}
.phonics-result.good{background:#dcfce7;color:#166534}
.phonics-result.ok{background:#fef9c3;color:#854d0e}
.phonics-result.bad{background:#fee2e2;color:#991b1b}
/* 语速控制 */
.speed-bar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.speed-label{font-size:.75rem;color:#718096}
.speed-btn{padding:4px 10px;border:1px solid #e2e8f0;border-radius:20px;background:#f7fafc;cursor:pointer;font-size:.75rem;color:#4a5568}
.speed-btn.active{border-color:#4a90d9;background:#ebf4ff;color:#2b6cb0;font-weight:600}
/* 统计面板 */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:#f7fafc;border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:1.6rem;font-weight:800;color:#2b6cb0}
.stat-label{font-size:.75rem;color:#718096;margin-top:2px}
/* 词汇卡片音标 */
.vocab-card .sym{font-size:.72rem;color:#4a90d9;margin-top:1px}
/* 场景收藏 */
.scene-btn .star{position:absolute;top:5px;right:7px;font-size:.75rem;opacity:.35;cursor:pointer;background:none;border:none;padding:0;line-height:1}
.scene-btn .star.on{opacity:.9}
.scene-btn{position:relative}
/* 暗色模式 */
@media(prefers-color-scheme:dark){
  body{background:#1a202c;color:#e2e8f0}
  h1{color:#e2e8f0}
  .chat-box,.panel,.quiz-box,.repeat-card,.phonics-card{background:#2d3748;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .msg.bot{background:#374151;color:#e2e8f0}
  .msg.hint{background:#3d3000;border-color:#92400e;color:#fcd34d}
  .msg.bot .zh{color:#9ca3af;border-top-color:#4b5563}
  .tab-btn{background:#2d3748;border-color:#4b5563;color:#cbd5e0}
  .tab-btn.active{background:#1e3a5f;border-color:#4a90d9;color:#93c5fd}
  .scene-btn{background:#2d3748;border-color:#4b5563}
  .scene-btn .label{color:#e2e8f0}
  .scene-btn .desc{color:#9ca3af}
  .scene-btn:hover,.scene-btn.active{background:#1e3a5f;border-color:#4a90d9}
  textarea{background:#374151;border-color:#4b5563;color:#e2e8f0}
  .vocab-card{background:#2d3748;border-color:#4b5563}
  .vocab-card .en{color:#e2e8f0}
  .vocab-card:hover{background:#374151}
  .vocab-section{color:#9ca3af;border-bottom-color:#4b5563}
  .wordbook-item,.history-item,.phonics-word,.phonics-sent,.stat-card{background:#374151}
  .vocab-search,.quiz-input{background:#374151;border-color:#4b5563;color:#e2e8f0}
  .speed-btn,.cat-btn,.phonics-cat-btn{background:#374151;border-color:#4b5563;color:#cbd5e0}
  .quiz-btn.secondary{background:#374151;border-color:#4b5563;color:#cbd5e0}
  .phonics-card{background:#374151}
}
/* 复习提醒 */
.review-badge{display:inline-block;background:#ef4444;color:#fff;border-radius:10px;font-size:.65rem;padding:1px 5px;margin-left:4px;vertical-align:middle}
/* 进步曲线 */
#chartCanvas{width:100%;max-width:668px;height:160px;display:block;margin-top:12px}
/* 打卡悬浮条 */
.ci-bar-wrap{width:100%;max-width:700px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:8px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ci-bar-time{font-size:1rem;font-weight:800;color:#2b6cb0;min-width:52px;font-variant-numeric:tabular-nums}
.ci-bar-track{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.ci-bar-fill{height:100%;background:#4a90d9;border-radius:4px;transition:width .5s}
.ci-bar-btn{padding:4px 12px;border:none;border-radius:8px;background:#4a90d9;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap}
.ci-bar-btn:hover{background:#357abd}
.ci-bar-done{font-size:.82rem;font-weight:700;color:#166534}.checkin-timer{font-size:3rem;font-weight:800;color:#2b6cb0;text-align:center;margin:12px 0 4px;font-variant-numeric:tabular-nums}
.checkin-progress{width:100%;height:14px;background:#e2e8f0;border-radius:8px;overflow:hidden;margin-bottom:8px}
.checkin-progress-bar{height:100%;background:#4a90d9;border-radius:8px;transition:width .5s}
.checkin-calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}
.checkin-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:600;background:#f0f4f8;color:#718096}
.checkin-day.done{background:#4a90d9;color:#fff}
.checkin-day.today{box-shadow:0 0 0 2px #4a90d9}
.checkin-streak{text-align:center;font-size:.9rem;color:#2d3748;margin:8px 0}
</style>
</head>
<body>
<h1>💬 职场英语口语练习</h1>
<div class="ci-bar-wrap" id="ciBarWrap">
  <span class="ci-bar-time" id="ciBarTime">00:00</span>
  <div class="ci-bar-track"><div class="ci-bar-fill" id="ciBarFill" style="width:0%"></div></div>
  <span class="ci-bar-done" id="ciBarDone" style="display:none">🎉 今日打卡完成</span>
  <button class="ci-bar-btn" id="ciBarBtn" onclick="toggleCheckinTimer()">▶ 开始</button>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('practice')">🗣️ 口语练习</button>
  <button class="tab-btn" onclick="switchTab('vocab')">📚 词汇卡片</button>
  <button class="tab-btn" onclick="switchTab('quiz')">🧠 测验</button>
  <button class="tab-btn" onclick="switchTab('repeat')">🎙️ 跟读</button>
  <button class="tab-btn" onclick="switchTab('phonics')">🔤 音标</button>
  <button class="tab-btn" onclick="switchTab('wordbook')">⭐ 单词本<span id="reviewBadge" class="review-badge" style="display:none">0</span></button>
  <button class="tab-btn" onclick="switchTab('history')">📈 练习记录</button>
  <button class="tab-btn" onclick="switchTab('checkin')">🔥 每日打卡</button>
</div>
<div class="speed-bar" style="width:100%;max-width:700px">
  <span class="speed-label">🔊 语速：</span>
  <button class="speed-btn" onclick="setSpeed(0.7)">慢速</button>
  <button class="speed-btn active" onclick="setSpeed(1)">正常</button>
  <button class="speed-btn" onclick="setSpeed(1.3)">快速</button>
</div>
<div id="tab-practice" style="width:100%;max-width:700px">
<div class="scenes" id="scenes"></div>
<div class="chat-box" id="chatBox" style="display:none">
  <div class="toolbar">
    <span id="sceneName"></span>
    <button class="hint-btn" onclick="showHint()">💡 提示</button>
    <button class="restart-btn" onclick="restartScene()">↺ 重新开始</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" placeholder="输入你的英文回复..." onkeydown="handleKey(event)" rows="1" oninput="autoResize(this)"></textarea>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="按住说话">🎤</button>
    <button class="send-btn" onclick="sendMsg()">发送</button>
  </div>
</div>
</div>
<div id="tab-vocab" class="panel">
  <div class="vocab-toolbar">
    <input class="vocab-search" id="vocabSearch" placeholder="🔍 搜索单词或中文..." oninput="renderVocab()">
  </div>
  <div class="cat-filter" id="catFilter"></div>
  <div class="vocab-grid" id="vocabGrid"></div>
</div>
<div id="tab-quiz" class="panel">
  <div class="quiz-box" id="quizBox"></div>
</div>
<div id="tab-repeat" class="panel">
  <div class="repeat-card" id="repeatCard"></div>
</div>
<div id="tab-phonics" class="panel">
  <div class="phonics-layout">
    <div class="phonics-sidebar" id="phoneticsSidebar"></div>
    <div class="phonics-main" id="phoneticsMain"></div>
  </div>
</div>
<div id="tab-wordbook" class="panel">
  <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px">
    <button class="quiz-btn" style="padding:6px 14px;font-size:.8rem" onclick="startWordbookQuiz()">🧠 复习测验</button>
    <button class="quiz-btn secondary" style="padding:6px 14px;font-size:.8rem" onclick="exportWordbook()">📤 导出单词本</button>
  </div>
  <div class="wordbook" id="wordbookList"></div>
</div>
<div id="tab-history" class="panel">
  <div class="stats-grid" id="statsGrid"></div>
  <canvas id="chartCanvas"></canvas>
  <div class="history-list" id="historyList"></div>
</div>
<div id="tab-checkin" class="panel">
  <div style="text-align:center;margin-bottom:8px">
    <div style="font-size:1rem;font-weight:700;color:#2d3748">今日学习进度</div>
    <div class="checkin-timer" id="ciTimer">00:00</div>
    <div style="font-size:.8rem;color:#718096;margin-bottom:8px" id="ciGoalLabel">目标 60 分钟</div>
    <div class="checkin-progress"><div class="checkin-progress-bar" id="ciBar" style="width:0%"></div></div>
    <button class="quiz-btn" id="ciBtn" onclick="toggleCheckinTimer()" style="margin-top:10px">▶ 开始学习</button>
    <div id="ciDoneMsg" style="display:none;margin-top:8px;font-size:.9rem;font-weight:700;color:#166534">🎉 今日打卡完成！</div>
  </div>
  <div class="checkin-streak" id="ciStreak"></div>
  <div style="font-size:.8rem;color:#718096;text-align:center;margin-bottom:6px">本月打卡</div>
  <div class="checkin-calendar" id="ciCalendar"></div>
</div>
<script>
const SCENES = [
  {
    id:'standup', icon:'🗓️', label:'每日站会', desc:'进度同步 & 阻塞汇报',
    turns:[
      {bot:"Good morning! Let's start our standup. What did you work on yesterday?", zh:"早上好！我们开始站会吧。你昨天做了什么？", hints:["Yesterday I worked on...", "I finished implementing the X feature.", "I spent most of yesterday on bug fixing for..."], hintsZh:["昨天我做的是……", "我完成了X功能的开发。", "昨天大部分时间都在修……的bug。"]},

      {bot:"Tell me about a time a data pipeline failed in production. How did you handle it?", zh:"说一个生产环境数据管道故障的经历，你是怎么处理的？", hints:["In banking, a daily settlement job failed at 3am due to an upstream schema change. I identified the root cause from logs, applied a hotfix, reran the job, and added a schema validation check to prevent recurrence.", "In e-commerce, a Spark job ran out of memory during peak season. I tuned the executor memory, enabled dynamic allocation, and added a job monitoring alert.", "I always follow three steps: identify the root cause from logs, apply a targeted fix rather than a workaround, and add monitoring to catch the same issue earlier next time."], hintsZh:["银行日结任务因上游表结构变更在凌晨3点失败。我从日志定位根因，打了热修复，重跑任务，并加了表结构校验防止复发。", "电商大促期间Spark任务内存溢出，我调整了executor内存配置，开启动态分配，并加了任务监控告警。", "我固定三步：从日志定位根因、打针对性修复而非临时方案、加监控让下次更早发现同样问题。"]},
      {bot:"How do you manage data lineage and table dependencies in a large warehouse?", zh:"你如何在大型数仓中管理数据血缘和表依赖关系？", hints:["I maintain a lineage map that tracks which tables each job reads from and writes to. When a source table changes, I can quickly identify all downstream impact.", "We use Airflow DAGs to define task dependencies explicitly. Combined with a metadata catalog, anyone can trace where a field originates.", "In banking, lineage is critical for compliance — regulators want to know exactly where a reported number comes from. I document lineage down to the field level for key reports."], hintsZh:["我维护血缘地图，记录每个任务的来源表和目标表。源表变更时，能快速识别所有下游影响。", "用Airflow DAG显式定义任务依赖，结合元数据目录，任何人都能追溯字段来源。", "银行血缘管理是合规要求——监管机构要知道报表数字从哪来。我对关键报表做到字段级血缘文档。"]},
      {bot:"What's your approach to communicating with business stakeholders when data is delayed or incorrect?", zh:"数据延误或不准确时，你如何与业务方沟通？", hints:["I proactively send a heads-up as soon as I detect an issue — before they notice. I include the scope of impact, the root cause, and the expected fix time.", "I never say 'the data is wrong' without context. I explain what happened, how it affects their reports, and what we're doing to fix it.", "I follow up with a post-incident summary after resolution — root cause, fix applied, and steps taken to prevent recurrence. This builds trust over time."], hintsZh:["发现问题后立即主动告知——在业务方发现之前。我说明影响范围、根因和预计修复时间。", "我不会只说'数据有问题'，我会解释发生了什么、影响了哪些报表、我们正在怎么修。", "修复后发一封事后总结——根因、修复方案、防止复发的措施，这样能建立长期信任。"]},
      {bot:"Star schema vs snowflake schema — which do you prefer and why?", zh:"星型模型和雪花模型，你更倾向哪个？为什么？", hints:["I prefer star schema for analytics workloads. Denormalized dimensions mean fewer joins, faster queries, and easier for business users to understand.", "Snowflake schema works better when dimension tables are very large or have complex hierarchies — it saves storage and reduces redundancy.", "In e-commerce I use star schema for order analytics. In banking I've seen snowflake used for product hierarchies where there are many levels of classification."], hintsZh:["分析型场景我更偏向星型模型。反范式维度减少join，查询更快，业务用户也更容易理解。", "雪花模型适合维度表很大或有复杂层级的情况——节省存储减少冗余。", "电商订单分析用星型，银行产品层级分类复杂，见过用雪花处理多层分类结构的。"]},
      {bot:"How do you handle slowly changing dimensions (SCD)? What types have you used?", zh:"你如何处理缓慢变化维（SCD）？用过哪些类型？", hints:["SCD Type 1 overwrites old values — simple but loses history. I use it for non-critical fields like phone numbers.", "SCD Type 2 adds a new row with effective dates — it preserves full history. I use it for customer addresses and product pricing in banking.", "In e-commerce, I used SCD Type 2 for the warehouse dimension when warehouses changed their region assignment, so historical orders still map to the correct region."], hintsZh:["SCD Type 1直接覆盖旧值——简单但丢历史，用于电话号码等非关键字段。", "SCD Type 2新增一行并记录有效期——保留完整历史，用于银行的客户地址和产品定价。", "电商中，仓库更换所属大区时用SCD Type 2，确保历史订单仍映射到正确大区。"]},
      {bot:"How do you ensure data security and access control in your work?", zh:"在工作中你如何保障数据安全和权限控制？", hints:["I follow the principle of least privilege — each user or service account only gets access to the tables they actually need.", "In banking, all access requests go through a formal approval process. I never grant access directly; it always goes through the governance team.", "For sensitive data like customer PII or transaction amounts, I apply column-level masking so analysts can query without seeing raw values."], hintsZh:["我遵循最小权限原则——每个用户或服务账号只获得实际需要的表的权限。", "银行所有授权申请都要走正式审批流程，我不直接授权，必须通过治理团队。", "客户PII或交易金额等敏感数据，我做列级脱敏，让分析师可以查询但看不到原始值。"]},
      {bot:"What's the most challenging problem you've ever faced at work? Tell me about it.", zh:"你工作中遇到过最难、印象最深的问题是什么？说说看。", hints:["The hardest case was in banking — a daily settlement reconciliation broke silently for 3 days before anyone noticed. The root cause was a timezone conversion bug that only affected transactions near midnight. It took 2 days to trace through 5 systems to find it.", "In e-commerce, the toughest challenge was a data skew issue during peak season that caused Spark jobs to run 10x slower. Fixing it required redesigning the partition strategy and salting the join keys — while keeping the pipeline running in production.", "The most memorable was tracking down an unknown difference of 200 units in inventory that persisted for weeks. It turned out to be caused by a combination of a cutoff date mismatch and a code mapping gap in two separate systems — neither alone was the cause."], hintsZh:["最难的是银行日结对账，数据差异持续了3天才被发现。根因是时区转换bug，只影响午夜前后的交易，花了2天追溯5个系统才找到。", "电商大促期间遇到严重数据倾斜，Spark任务慢了10倍。修复需要重新设计分区策略并对join键加盐，同时还要保证生产管道不停。", "最印象深刻的是一个持续几周200件的库存未知差异。最终发现是截止日期不一致和两个系统各自的编码映射缺失叠加导致的——单独任何一个都不是根因。"]},
      {bot:"Tell me about a time you had a disagreement with a colleague or business stakeholder. How did you resolve it?", zh:"说一次你和同事或业务方有分歧的经历，你是怎么解决的？", hints:["A business analyst insisted a number was wrong, but after investigation it turned out the report logic was correct and their expectation was based on a misunderstood definition. I walked them through the calculation step by step until we were on the same page.", "My colleague and I disagreed on whether to use full refresh or incremental for a large table. I prepared a comparison with actual run times and storage costs, and we aligned on incremental with a weekly full refresh as a safety net.", "In banking, the finance team wanted a field calculated differently from the agreed definition. I looped in the data governance team, documented both interpretations, and we held a formal alignment meeting to settle it."], hintsZh:["业务分析师坚持认为数据有误，但排查后发现报表逻辑正确，是他们对指标定义理解有偏差。我逐步拆解计算过程，直到双方对齐。", "我和同事对一张大表选全量还是增量有分歧。我准备了实际运行时间和存储成本对比，最终对齐为增量加每周全量兜底。", "银行财务团队想要的字段计算口径和既定定义不同。我拉上数据治理团队，把两种口径都文档化，召开正式对齐会议来确定。"]},
      {bot:"How do you prioritize when you have multiple urgent tasks at the same time?", zh:"同时有多个紧急任务时，你如何排优先级？", hints:["I assess impact first — which issue affects the most users or has a regulatory deadline. In banking, compliance reports always take highest priority.", "I communicate immediately with all stakeholders, give each an ETA, and start with the one with the earliest business impact. I also ask if any can be temporarily unblocked by a workaround.", "I use a simple matrix: urgency vs. impact. High impact and high urgency go first. I also flag if I need additional resource to avoid missing any deadline."], hintsZh:["我先评估影响范围——哪个问题影响用户最多或有监管截止时间。银行合规报表永远最优先。", "我立即和所有相关方沟通，分别给出ETA，从业务影响最早的开始做，同时问是否有临时方案可以先解除阻塞。", "我用一个简单矩阵：紧急度 vs 影响度，高影响+高紧急优先。如果资源不够我会提前说，避免任何截止时间被错过。"]},
      {bot:"Have you ever pushed back on a requirement you thought was technically wrong or risky? How did you handle it?", zh:"你有没有反驳过你认为技术上有问题或有风险的需求？你是怎么处理的？", hints:["Yes. In banking, a PM wanted to add a direct delete on a production fact table to fix a data issue. I pushed back and proposed a soft-delete flag plus a reprocessing job instead — safer and auditable.", "In e-commerce, a stakeholder wanted a real-time dashboard from a table that was only updated daily. I explained the limitation, proposed an alternative with a clearly labeled 'last updated' timestamp, and they agreed.", "I always push back with data, not just opinion. I document the risk, propose an alternative, and escalate if the stakeholder insists on a risky approach — especially in a regulated environment like banking."], hintsZh:["有。银行有个PM想直接在生产事实表上delete来修数，我反驳了，提议用软删除标志加重处理任务替代——更安全且有审计记录。", "电商有个需求方想要实时看板，但数据表只是每天更新。我说明了限制，提议用带明确'最后更新时间'标签的方案，对方同意了。", "我总是用数据而不只是观点来反驳。我记录风险、提出替代方案，如果对方坚持危险做法就升级——在银行这种受监管环境中尤其如此。"]},
      {bot:"Last question — where do you see yourself in 3 years? What are your career goals?", zh:"最后——你对自己3年后有什么规划？职业目标是什么？", hints:["I'd like to leverage my cross-industry experience in e-commerce and banking to take on a technical lead role, driving data architecture decisions for complex business domains.", "My goal is to build more sophisticated real-time data systems — combining the high-volume demands of e-commerce with the accuracy requirements of banking.", "I want to grow into a data engineering lead who can define standards, mentor the team, and drive end-to-end data product delivery across industries."], hintsZh:["我希望利用电商和银行的跨行业经验，担任技术负责人，主导复杂业务域的数据架构决策。", "我的目标是搭建更完善的实时数据系统，结合电商的高吞吐要求和银行的精准性要求。", "我想成长为数据工程负责人，能制定规范、带团队、跨行业推动端到端数据产品交付。"]}

let turnIndex = 0;
let hintShown = false;

function getFavScenes() { return JSON.parse(localStorage.getItem('favScenes')||'[]'); }
function toggleFav(id, e) {
  e.stopPropagation();
  const favs = getFavScenes();
  const idx = favs.indexOf(id);
  if (idx >= 0) favs.splice(idx,1); else favs.push(id);
  localStorage.setItem('favScenes', JSON.stringify(favs));
  renderScenes();
}

function renderScenes() {
  const favs = getFavScenes();
  const sorted = [...SCENES].sort((a,b) => (favs.includes(b.id)?1:0)-(favs.includes(a.id)?1:0));
  const c = document.getElementById('scenes');
  c.innerHTML = sorted.map(s => {
    const isFav = favs.includes(s.id);
    return `<div class="scene-btn" onclick="startScene('${s.id}')">
      <button class="star${isFav?' on':''}" onclick="toggleFav('${s.id}',event)" title="收藏">${isFav?'⭐':'☆'}</button>
      <div class="icon">${s.icon}</div>
      <div class="label">${s.label}</div>
      <div class="desc">${s.desc}</div>
    </div>`;
  }).join('');
}

function startScene(id) {
  currentScene = SCENES.find(s => s.id === id);
  turnIndex = 0;
  hintShown = false;
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(`'${id}'`)));
  document.getElementById('chatBox').style.display = 'flex';
  document.getElementById('sceneName').textContent = currentScene.icon + ' ' + currentScene.label;
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  addMsg('bot', currentScene.turns[0].bot, currentScene.turns[0].zh);
  document.getElementById('chatBox').scrollIntoView({behavior:'smooth', block:'start'});
}

let speechRate = 1;
function setSpeed(rate) {
  speechRate = rate;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.getAttribute('onclick').match(/[\d.]+/)[0]) === rate);
  });
}

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = speechRate;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function addMsg(role, text, zh) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  if (role === 'bot') {
    const btn = document.createElement('button');
    btn.className = 'speak-btn';
    btn.textContent = '🔊';
    btn.onclick = () => speak(text);
    div.appendChild(btn);
  }
  if (zh && role === 'bot') {
    const sub = document.createElement('div');
    sub.className = 'zh';
    sub.textContent = zh;
    div.appendChild(sub);
  }
  const msgs = document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showHint() {
  if (!currentScene) return;
  const turn = currentScene.turns[turnIndex];
  if (!turn) return;
  const div = document.createElement('div');
  div.className = 'msg hint';
  div.innerHTML = '💡 参考说法：<br>' + turn.hints.map((h,i) =>
    `• ${h} <button onclick="speak('${h.replace(/'/g,"\\'")}') " style="background:none;border:none;cursor:pointer;font-size:.8rem;opacity:.6;vertical-align:middle">🔊</button><br><span style="font-size:.72rem;color:#a16207;opacity:.85">　${turn.hintsZh[i]}</span>`
  ).join('<br>');
  const msgs = document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  hintShown = true;
}

function sendMsg() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !currentScene) return;
  addMsg('user', text);
  input.value = '';
  input.style.height = '42px';
  turnIndex++;
  hintShown = false;
  setTimeout(() => {
    const next = currentScene.turns[turnIndex];
    if (next) {
      addMsg('bot', next.bot, next.zh);
    } else {
      addMsg('bot', '✅ 太棒了！你已完成本场景练习。点击上方场景卡片继续练习，或点击 ↺ 重新开始。');
    }
  }, 400);
}

function restartScene() {
  if (currentScene) startScene(currentScene.id);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = '42px';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// 语音识别
let recognition = null;
let isRecording = false;

function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('你的浏览器不支持语音识别，请使用 Chrome 或 Safari。');
    return;
  }
  if (isRecording) {
    recognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹️';
  };
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    const input = document.getElementById('input');
    input.value = text;
    autoResize(input);
    showSimilarity(text);
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
  };
  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
  };
  recognition.start();
}

function similarity(a, b) {
  a = a.toLowerCase().replace(/[^a-z0-9 ]/g, '');
  b = b.toLowerCase().replace(/[^a-z0-9 ]/g, '');
  const wa = new Set(a.split(' ').filter(Boolean));
  const wb = new Set(b.split(' ').filter(Boolean));
  let common = 0;
  wa.forEach(w => { if (wb.has(w)) common++; });
  return common / Math.max(wa.size, wb.size, 1);
}

function showSimilarity(userText) {
  if (!currentScene) return;
  const turn = currentScene.turns[turnIndex];
  if (!turn) return;
  const best = Math.max(...turn.hints.map(h => similarity(userText, h)));
  let label, color;
  if (best >= 0.6) { label = '✅ 很接近！说得不错'; color = '#166534'; }
  else if (best >= 0.3) { label = '🟡 差一点，再试试'; color = '#854d0e'; }
  else { label = '🔴 差得有点多，参考一下提示'; color = '#991b1b'; }
  const div = document.createElement('div');
  div.className = 'msg hint';
  div.style.cssText = 'background:#f8fafc;border-color:#cbd5e0;color:' + color;
  div.textContent = label;
  const msgs = document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  saveHistory(currentScene.label, best, userText);
}

function switchTab(tab) {
  const allTabs = ['practice','vocab','quiz','repeat','phonics','wordbook','history','checkin'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', allTabs[i] === tab);
  });
  allTabs.forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (t === 'practice') { el.style.display = tab === 'practice' ? '' : 'none'; }
    else { el.classList.toggle('visible', t === tab); }
  });
  if (tab === 'wordbook') renderWordbook();
  if (tab === 'history') renderHistory();
  if (tab === 'vocab') renderVocab();
  if (tab === 'quiz') startQuiz();
  if (tab === 'repeat') startRepeat();
  if (tab === 'phonics') renderPhonics(0);
  if (tab === 'checkin') renderCheckin();
}

      {en:'exchange', zh:'换货', eg:'I\'d like to exchange this.', memo:'ex(出)+change(变) → 换一个 → 换货'},
      {en:'refund', zh:'退款', eg:'Can I get a refund?', memo:'re(退回)+fund(钱) → 退钱 → 退款'},
      {en:'cash', zh:'现金', eg:'Do you accept cash?', memo:'cash=现金，和card(刷卡)相对'},
      {en:'credit card', zh:'信用卡', eg:'Can I pay by credit card?', memo:'credit(信用)+card(卡) → 信用卡'},
    ]
  },
];

let activeCat = '';

function renderVocab() {
  // 分类筛选按钮（只渲染一次）

    ).join('');

    if (!items.length) return '';
    return `<div class="vocab-section" id="cat-${g.title}">${g.title}</div>` +
      items.map(v => {

        const symHtml = pw ? `<div class="sym">${pw.sym}</div>` : '';

          <div class="en">${v.en} <button onclick="event.stopPropagation();speak('${v.en.replace(/'/g,"\\'")}')  " style="background:none;border:none;cursor:pointer;font-size:.8rem;opacity:.5">🔊</button>

          <div class="eg">"${v.eg}"</div>

function setCat(cat) {
  activeCat = cat === '全部' ? '' : cat;
  document.getElementById('catFilter').innerHTML = '';
  renderVocab();
  if (activeCat) {
    setTimeout(() => {
      const el = document.getElementById('cat-' + activeCat);
      if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 50);
  }
}

// ── 测验模式 ──
let quizList = [], quizIdx = 0, quizAnswered = false, quizMode = 'zh2en', quizWrong = [];

let quizCat = '';
function getAllVocabItems() {
  return quizCat ? VOCAB_GROUPS.filter(g=>g.title===quizCat).flatMap(g=>g.items) : VOCAB_GROUPS.flatMap(g => g.items);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(mode) {
  quizMode = mode || 'zh2en';
  quizList = shuffle(getAllVocabItems());
  quizIdx = 0; quizAnswered = false; quizWrong = [];
  renderQuiz();
}

function startWrongQuiz() {
  if (!quizWrong.length) { alert('没有错题！'); return; }
  quizList = shuffle(quizWrong);
  quizIdx = 0; quizAnswered = false; quizWrong = [];
  renderQuiz();
}

function renderQuiz() {
  const item = quizList[quizIdx];
  const box = document.getElementById('quizBox');
  const isZh2En = quizMode === 'zh2en';
  const prompt = isZh2En ? item.zh : item.en;
  const phLabel = isZh2En ? '看中文，写英文' : '看英文，写中文';
  const phColor = isZh2En ? '#2b6cb0' : '#166534';
  const wrongBtn = quizWrong.length ? `<button class="quiz-btn secondary" onclick="startWrongQuiz()" style="font-size:.8rem">🔁 错题重练(${quizWrong.length})</button>` : '';
  const catBtns = ['全部', ...VOCAB_GROUPS.map(g=>g.title)].map(t =>
    `<button class="quiz-btn${(t==='全部'&&!quizCat)||(t===quizCat)?'':' secondary'}" onclick="quizCat='${t==='全部'?'':t}';startQuiz('${quizMode}')" style="padding:4px 10px;font-size:.75rem">${t}</button>`
  ).join('');
  box.innerHTML = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${catBtns}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px">
      <button class="quiz-btn${quizMode==='zh2en'?' ':' secondary'}" onclick="startQuiz('zh2en')" style="padding:6px 14px;font-size:.8rem">中→英</button>
      <button class="quiz-btn${quizMode==='en2zh'?' ':' secondary'}" onclick="startQuiz('en2zh')" style="padding:6px 14px;font-size:.8rem">英→中</button>
      ${wrongBtn}
    </div>
    <div style="font-size:.78rem;color:#a0aec0;margin-bottom:8px">${quizIdx+1} / ${quizList.length} · ${phLabel}</div>
    <div style="font-size:1.6rem;font-weight:800;color:${phColor};margin-bottom:20px">${prompt}</div>
    <input class="quiz-input" id="quizInput" placeholder="${isZh2En?'输入英文...':'输入中文...'}" onkeydown="if(event.key==='Enter')checkQuiz()">
    <br>
    <button class="quiz-btn" onclick="checkQuiz()">确认</button>
    <button class="quiz-btn secondary" onclick="nextQuiz()">跳过</button>
    <div id="quizResult"></div>
  `;
  setTimeout(() => document.getElementById('quizInput')?.focus(), 50);
}

function checkQuiz() {
  if (quizAnswered) return;
  const item = quizList[quizIdx];
  const val = (document.getElementById('quizInput')?.value || '').trim().toLowerCase();
  const correct = (quizMode === 'zh2en' ? item.en : item.zh).toLowerCase();
  const score = similarity(val, correct);
  quizAnswered = true;
  if (score < 0.7) quizWrong.push(item);
  const res = document.getElementById('quizResult');
  if (score >= 0.7) {
    res.innerHTML = `<div class="quiz-result" style="color:#166534">✅ 正确！</div><div class="quiz-answer">${item.en} — ${item.zh} <button onclick="speak('${item.en.replace(/'/g,"\\'")}')">🔊</button></div><button class="quiz-btn" onclick="nextQuiz()">下一题</button>`;
  } else {
    res.innerHTML = `<div class="quiz-result" style="color:#991b1b">❌ 答案：${item.en} — ${item.zh} <button onclick="speak('${item.en.replace(/'/g,"\\'")}')">🔊</button></div><button class="quiz-btn" onclick="nextQuiz()">下一题</button>`;
  }
}

function nextQuiz() {
  quizIdx++;
  quizAnswered = false;
  if (quizIdx >= quizList.length) {
    const wrongBtn = quizWrong.length ? `<button class="quiz-btn" onclick="startWrongQuiz()" style="margin-top:8px">🔁 错题重练（${quizWrong.length}题）</button>` : '';
    document.getElementById('quizBox').innerHTML = `<div style="font-size:1.2rem;font-weight:700;margin-bottom:8px">🎉 测验完成！共 ${quizList.length} 题</div><div style="color:#718096;font-size:.9rem;margin-bottom:16px">答错 ${quizWrong.length} 题</div><button class="quiz-btn" onclick="startQuiz('zh2en')">中→英再来</button> <button class="quiz-btn secondary" onclick="startQuiz('en2zh')">英→中再来</button>${wrongBtn}`;
    return;
  }
  renderQuiz();
}

let repeatList = [], repeatIdx = 0;

function startRepeat() {
  repeatList = shuffle(getAllVocabItems());
  repeatIdx = 0;
  renderRepeat();
}

function renderRepeat() {
  const item = repeatList[repeatIdx];
  const card = document.getElementById('repeatCard');
  card.innerHTML = `
    <div style="font-size:.8rem;color:#a0aec0;margin-bottom:12px">${repeatIdx+1} / ${repeatList.length}</div>
    <div class="repeat-en">${item.en}</div>
    <div class="repeat-zh">${item.zh}</div>
    <div class="repeat-eg">"${item.eg}"</div>

      <button class="quiz-btn secondary" onclick="speak('${item.en.replace(/'/g,"\\'")}')">🔊 听发音</button>
      <button class="quiz-btn" id="repeatMicBtn" onclick="startRepeatMic('${item.en.replace(/'/g,"\\'")}')">🎤 开始跟读</button>
    </div>

    <div style="margin-top:16px">

function prevRepeat() {

function nextRepeat() {
  repeatIdx = (repeatIdx + 1) % repeatList.length;
  renderRepeat();
}

let repeatRecognition = null;
function startRepeatMic(targetEn) {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('你的浏览器不支持语音识别，请使用 Chrome 或 Safari。');
    return;
  }
  const btn = document.getElementById('repeatMicBtn');
  if (repeatRecognition) { repeatRecognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  repeatRecognition = new SR();
  repeatRecognition.lang = 'en-US';
  repeatRecognition.interimResults = false;
  btn.textContent = '⏹️ 停止';
  btn.style.background = '#fee2e2';
  repeatRecognition.onresult = (e) => {
    const said = e.results[0][0].transcript;
    const score = similarity(said, targetEn);
    const res = document.getElementById('repeatResult');
    res.style.display = 'block';
    if (score >= 0.7) {
      res.className = 'repeat-result good';
      res.textContent = '✅ 发音很准！说的是："' + said + '"';
    } else if (score >= 0.4) {
      res.className = 'repeat-result ok';
      res.textContent = '🟡 差不多，继续练！说的是："' + said + '"';
    } else {
      res.className = 'repeat-result bad';
      res.textContent = '🔴 再试一次！说的是："' + said + '"（目标：' + targetEn + '）';
    }
  };
  repeatRecognition.onend = () => {
    repeatRecognition = null;
    if (btn) { btn.textContent = '🎤 再次跟读'; btn.style.background = ''; }
  };
  repeatRecognition.onerror = () => {
    repeatRecognition = null;
    if (btn) { btn.textContent = '🎤 开始跟读'; btn.style.background = ''; }
  };
  repeatRecognition.start();
}

// ── 单词本（localStorage）──
// ── 单词本 + 复习提醒 ──
function getReviewDue(word) {
  if (!word.addedDate) return false;
  const intervals = [1,3,7,14,30]; // 艾宾浩斯间隔（天）
  const added = new Date(word.addedDate);
  const now = new Date();
  const daysPassed = Math.floor((now - added) / 86400000);
  return intervals.some(d => d === daysPassed);
}

function updateReviewBadge() {
  const book = JSON.parse(localStorage.getItem('wordbook')||'[]');
  const due = book.filter(getReviewDue).length;
  const badge = document.getElementById('reviewBadge');
  if (badge) { badge.style.display = due ? 'inline-block' : 'none'; badge.textContent = due; }
}

function saveWord(en, zh) {
  const book = JSON.parse(localStorage.getItem('wordbook') || '[]');
  if (!book.find(w => w.en === en)) {
    book.push({en, zh, date: new Date().toLocaleDateString(), addedDate: new Date().toISOString()});
    localStorage.setItem('wordbook', JSON.stringify(book));
    updateReviewBadge();
    alert('已加入单词本：' + en);
  } else {
    alert('已在单词本中：' + en);
  }
}

function renderWordbook() {
  const book = JSON.parse(localStorage.getItem('wordbook') || '[]');
  const el = document.getElementById('wordbookList');
  updateReviewBadge();
  if (!book.length) { el.innerHTML = '<div style="color:#a0aec0;font-size:.85rem;padding:12px">单词本是空的，在词汇卡片中点「+ 单词本」添加</div>'; return; }
  const dueCount = book.filter(getReviewDue).length;
  const dueHdr = dueCount ? `<div style="background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:.82rem;color:#854d0e">🔔 今天有 <b>${dueCount}</b> 个单词需要复习（按艾宾浩斯遗忘曲线提醒）</div>` : '';
  el.innerHTML = dueHdr + book.map((w,i) => {
    const due = getReviewDue(w);
    const vocab = VOCAB_GROUPS.flatMap(g=>g.items).find(v=>v.en.toLowerCase()===w.en.toLowerCase());
    const detailHtml = vocab ? `<div id="wb-detail-${i}" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0;font-size:.8rem;color:#4a5568">
      <div style="color:#4a90d9;font-style:italic;margin-bottom:4px">"${vocab.eg}"</div>
      <div style="color:#718096">${vocab.zh}</div>
    </div>` : '';
    return `<div class="wordbook-item" style="${due?'border-left:3px solid #f59e0b':''};cursor:pointer;flex-direction:column;align-items:stretch" onclick="toggleWbDetail(${i})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span><b>${w.en}</b>${due?' <span class="review-badge">复习</span>':''} — ${w.zh}</span>
        <span>
          <button onclick="event.stopPropagation();speak('${w.en.replace(/'/g,"\\'")}') " style="background:none;border:none;cursor:pointer;font-size:.85rem;opacity:.6">🔊</button>
          <button class="del-btn" onclick="event.stopPropagation();delWord(${i})">删除</button>
        </span>
      </div>
      ${detailHtml}
    </div>`;
  }).join('');
}

function toggleWbDetail(i) {
  const el = document.getElementById('wb-detail-' + i);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function delWord(i) {
  const book = JSON.parse(localStorage.getItem('wordbook') || '[]');
  book.splice(i, 1);
  localStorage.setItem('wordbook', JSON.stringify(book));
  renderWordbook();
}

// ── 练习历史记录 ──
function saveHistory(scene, score, text) {
  const hist = JSON.parse(localStorage.getItem('history') || '[]');
  hist.unshift({scene, score, text, date: new Date().toLocaleString()});
  if (hist.length > 50) hist.pop();
  localStorage.setItem('history', JSON.stringify(hist));
}

function renderHistory() {
  const hist = JSON.parse(localStorage.getItem('history') || '[]');
  const el = document.getElementById('historyList');
  const sg = document.getElementById('statsGrid');
  if (!hist.length) {
    sg.innerHTML = '';
    el.innerHTML = '<div style="color:#a0aec0;font-size:.85rem;padding:12px">还没有练习记录，先去口语练习试试吧</div>';
    return;
  }
  const total = hist.length;
  const avg = (hist.reduce((s,h) => s + h.score, 0) / total * 100).toFixed(0);
  const sceneCounts = {};
  hist.forEach(h => { sceneCounts[h.scene] = (sceneCounts[h.scene]||0)+1; });
  const sorted = Object.entries(sceneCounts).sort((a,b)=>b[1]-a[1]);
  const topScene = sorted[0][0];
  const leastScene = sorted[sorted.length-1][0];
  sg.innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">练习次数</div></div>
    <div class="stat-card"><div class="stat-num">${avg}%</div><div class="stat-label">平均得分</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:.9rem">🔥 ${topScene}</div><div class="stat-label">最常练</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:.9rem">💤 ${leastScene}</div><div class="stat-label">最少练</div></div>
  `;
  // 进步曲线（最近20条，按时间正序）
  const canvas = document.getElementById('chartCanvas');
  const recent = [...hist].reverse().slice(-20);
  if (canvas && recent.length >= 2) {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = 160 * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = canvas.offsetWidth, H = 160, pad = 24;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--chart-bg') || '#f7fafc';
    ctx.fillRect(0,0,W,H);
    // grid lines
    ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
    [0,0.25,0.5,0.75,1].forEach(v => {
      const y = H - pad - v*(H-pad*2);
      ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(W-pad,y); ctx.stroke();
      ctx.fillStyle = '#a0aec0'; ctx.font = '10px sans-serif';
      ctx.fillText((v*100).toFixed(0)+'%', 2, y+4);
    });
    // line
    const step = (W - pad*2) / (recent.length - 1);
    ctx.beginPath(); ctx.strokeStyle = '#4a90d9'; ctx.lineWidth = 2;
    recent.forEach((h,i) => {
      const x = pad + i*step, y = H - pad - h.score*(H-pad*2);
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
    // dots
    recent.forEach((h,i) => {
      const x = pad + i*step, y = H - pad - h.score*(H-pad*2);
      ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
      ctx.fillStyle = h.score>=0.6?'#166534':h.score>=0.3?'#854d0e':'#991b1b';
      ctx.fill();
    });
    ctx.fillStyle = '#718096'; ctx.font = '11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('近期得分走势（最近'+recent.length+'次）', W/2, H-4);
  } else if (canvas) { canvas.width = 0; }
  el.innerHTML = hist.map(h => {
    const cls = h.score >= 0.6 ? 'good' : h.score >= 0.3 ? 'ok' : 'bad';
    const lbl = h.score >= 0.6 ? '✅ 很接近' : h.score >= 0.3 ? '🟡 差一点' : '🔴 差得多';
    return `<div class="history-item ${cls}"><span class="score">${lbl}</span>${h.scene} · "${h.text}" <span style="color:#a0aec0;font-size:.72rem;margin-left:4px">${h.date}</span></div>`;
  }).join('');
}

let currentPhonicsIdx = 0;
let phonicsMicMap = {};

function renderPhonics(idx) {
  currentPhonicsIdx = idx;
  phonicsMicMap = {};
  const sidebar = document.getElementById('phoneticsSidebar');
  sidebar.innerHTML = PHONICS.map((p,i) => {
    const groups = {
      0:  '<div class="ph-grp-hdr" style="color:#4a90d9">🔵 元音（20个）</div><div class="ph-grp-sub">— 单元音（12个）—</div>',
      12: '<div class="ph-grp-sub" style="margin-top:4px">— 双元音（8个）—</div>',
      20: '<div class="ph-grp-hdr" style="color:#e05d2b;margin-top:8px">🔴 辅音（28个）</div><div class="ph-grp-sub">— 塞音（爆破音）p/b/t/d/k/g —</div>',
      26: '<div class="ph-grp-sub">— 摩擦音 f/v/s/z/ʃ/ʒ/θ/ð/h —</div>',
      35: '<div class="ph-grp-sub">— 塞擦音 tʃ/dʒ —</div>',
      37: '<div class="ph-grp-sub">— 鼻音 m/n/ŋ —</div>',
      40: '<div class="ph-grp-sub">— 边音/半元音 l/r/j/w —</div>',
      44: '<div class="ph-grp-sub">— 辅音组合 ts/dz/tr/dr —</div>',
    };
    return (groups[i]||'') + `<button class="phonics-cat-btn${i===idx?' active':''}" onclick="renderPhonics(${i})">${p.symbol} ${p.name}</button>`;
  }).join('');

  const p = PHONICS[idx];
  const main = document.getElementById('phoneticsMain');
  main.scrollIntoView({behavior:'smooth', block:'start'});
  const wordsHtml = p.words.map((w,i) => `
    <div class="phonics-word">
      <div class="pw-en">${w.en} <button onclick="speak('${w.en}')" style="background:none;border:none;cursor:pointer;opacity:.5;font-size:.8rem">🔊</button></div>
      <div class="pw-sym">${w.sym}</div>
      <div class="pw-zh">${w.zh}${w.rhyme ? ` <span style="color:#b45309;font-size:.72rem">· 谐音：${w.rhyme}</span>` : ''}</div>
      <button class="quiz-btn" style="margin-top:4px;padding:4px 10px;font-size:.75rem" id="pmicW${idx}_${i}" onclick="startPhonicsMic('word',${idx},${i},'${w.en.replace(/'/g,"\\'")}')">🎤 跟读</button>
      <div class="phonics-result" id="presW${idx}_${i}"></div>
    </div>
  `).join('');

  const sentsHtml = p.sentences.map((s,i) => `
    <div class="phonics-sent">
      <div class="ps-en">${s.en} <button onclick="speak('${s.en.replace(/'/g,"\\'")}')  " style="background:none;border:none;cursor:pointer;opacity:.5;font-size:.8rem">🔊</button></div>
      <div class="ps-zh">${s.zh}</div>
      <button class="quiz-btn" style="margin-top:4px;padding:4px 10px;font-size:.75rem" id="pmicS${idx}_${i}" onclick="startPhonicsMic('sent',${idx},${i},'${s.en.replace(/'/g,"\\'")}')">🎤 跟读</button>
      <div class="phonics-result" id="presS${idx}_${i}"></div>
    </div>
  `).join('');

  document.getElementById('phoneticsMain').innerHTML = `
    <div class="phonics-card">
      <span class="phonics-symbol">${p.symbol}</span><span class="phonics-name">${p.name}</span>
      ${p.rhyme ? `<div style="display:inline-block;background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:3px 12px;font-size:.85rem;color:#854d0e;margin:6px 0 4px">🗣️ 谐音：${p.rhyme}</div>` : ''}
      <div class="phonics-desc">📌 ${p.desc}</div>
      <div style="font-size:.8rem;font-weight:700;color:#4a5568;margin-bottom:6px">单词练习</div>
      <div class="phonics-words">${wordsHtml}</div>
      <div style="font-size:.8rem;font-weight:700;color:#4a5568;margin:10px 0 6px">句子练习</div>
      <div class="phonics-sentences">${sentsHtml}</div>
    </div>
  `;
  speak(p.symbol.replace(/\//g,''));
}

function startPhonicsMic(type, pidx, sidx, target) {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('你的浏览器不支持语音识别，请使用 Chrome 或 Safari。');
    return;
  }
  const btnId = type==='word' ? `pmicW${pidx}_${sidx}` : `pmicS${pidx}_${sidx}`;
  const resId = type==='word' ? `presW${pidx}_${sidx}` : `presS${pidx}_${sidx}`;
  const btn = document.getElementById(btnId);
  const res = document.getElementById(resId);
  const key = btnId;
  if (phonicsMicMap[key]) { phonicsMicMap[key].stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'en-US';
  rec.interimResults = false;
  phonicsMicMap[key] = rec;
  btn.textContent = '⏹️ 停止';
  btn.style.background = '#fee2e2';
  rec.onresult = (e) => {
    const said = e.results[0][0].transcript;
    const score = similarity(said, target);
    res.style.display = 'block';
    if (score >= 0.7) {
      res.className = 'phonics-result good';
      res.textContent = '✅ 发音准确！说的是："' + said + '"';
    } else if (score >= 0.4) {
      res.className = 'phonics-result ok';
      res.textContent = '🟡 差不多，再练一次！说的是："' + said + '"';
    } else {
      res.className = 'phonics-result bad';
      res.textContent = '🔴 继续加油！说的是："' + said + '"（目标：' + target + '）';
    }
  };
  rec.onend = rec.onerror = () => {
    phonicsMicMap[key] = null;
    if (btn) { btn.textContent = '🎤 再跟读'; btn.style.background = ''; }
  };
  rec.start();
}
// ── 每日打卡 ──
const CI_GOAL = 60 * 60; // 60分钟秒数
let ciSeconds = 0, ciRunning = false, ciInterval = null;

function ciTodayKey() { return 'ci_' + new Date().toISOString().slice(0,10); }

function ciLoad() {
  const d = JSON.parse(localStorage.getItem(ciTodayKey()) || '{"s":0,"done":false}');
  ciSeconds = d.s; return d;
}

function ciSave(done) {
  localStorage.setItem(ciTodayKey(), JSON.stringify({s: ciSeconds, done}));
}

function toggleCheckinTimer() {
  if (ciRunning) {
    clearInterval(ciInterval); ciRunning = false;
    document.getElementById('ciBtn').textContent = '▶ 继续学习';
    ciSave(ciSeconds >= CI_GOAL);
  } else {
    const d = ciLoad();
    if (d.done) return;
    ciRunning = true;
    document.getElementById('ciBtn').textContent = '⏸ 暂停';
    ciInterval = setInterval(() => {
      ciSeconds++;
      updateCheckinUI();
      if (ciSeconds >= CI_GOAL) {
        clearInterval(ciInterval); ciRunning = false;
        ciSave(true);
        markTodayDone();
        updateCheckinUI();
      }
    }, 1000);
  }
}

function markTodayDone() {
  const key = ciTodayKey();
  const all = JSON.parse(localStorage.getItem('ciDays') || '[]');
  if (!all.includes(key)) { all.push(key); localStorage.setItem('ciDays', JSON.stringify(all)); }
}

function updateCheckinUI() {
  const m = String(Math.floor(ciSeconds/60)).padStart(2,'0');
  const s = String(ciSeconds%60).padStart(2,'0');
  const timeStr = m + ':' + s;
  const pct = Math.min(ciSeconds/CI_GOAL*100, 100);
  const done = ciSeconds >= CI_GOAL;

  // 顶部条
  document.getElementById('ciBarTime').textContent = timeStr;
  document.getElementById('ciBarFill').style.width = pct + '%';
  document.getElementById('ciBarDone').style.display = done ? '' : 'none';
  const barBtn = document.getElementById('ciBarBtn');
  barBtn.style.display = done ? 'none' : '';
  barBtn.textContent = ciRunning ? '⏸ 暂停' : '▶ 开始';

  // 打卡 tab 内
  const timer = document.getElementById('ciTimer');
  if (timer) {
    timer.textContent = timeStr;
    document.getElementById('ciBar').style.width = pct + '%';
    document.getElementById('ciDoneMsg').style.display = done ? '' : 'none';
    document.getElementById('ciBtn').style.display = done ? 'none' : '';
    document.getElementById('ciBtn').textContent = ciRunning ? '⏸ 暂停' : '▶ 开始学习';
    document.getElementById('ciGoalLabel').textContent = done ? '✅ 已完成今日目标' : '目标 60 分钟';
  }
}

function renderCheckin() {
  const d = ciLoad();
  if (d.done && ciRunning) { clearInterval(ciInterval); ciRunning = false; }
  updateCheckinUI();

  // 连续打卡天数
  const all = JSON.parse(localStorage.getItem('ciDays') || '[]');
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const dd = new Date(today); dd.setDate(dd.getDate() - i);
    const k = 'ci_' + dd.toISOString().slice(0,10);
    if (all.includes(k)) streak++; else break;
  }
  document.getElementById('ciStreak').textContent = streak > 0 ? '🔥 已连续打卡 ' + streak + ' 天' : '今天开始你的第一天！';

  // 本月日历
  const cal = document.getElementById('ciCalendar');
  const y = today.getFullYear(), mo = today.getMonth();
  const daysInMonth = new Date(y, mo+1, 0).getDate();
  const todayStr = today.toISOString().slice(0,10);
  let html = '';
  // 星期标题
  ['日','一','二','三','四','五','六'].forEach(w => {
    html += `<div style="text-align:center;font-size:.7rem;color:#a0aec0">${w}</div>`;
  });
  // 第一天是周几，补空格
  const firstDay = new Date(y, mo, 1).getDay();
  for (let i = 0; i < firstDay; i++) html += '<div></div>';
  for (let i = 1; i <= daysInMonth; i++) {
    const ds = y + '-' + String(mo+1).padStart(2,'0') + '-' + String(i).padStart(2,'0');
    const isDone = all.includes('ci_' + ds);
    const isToday = ds === todayStr;
    html += `<div class="checkin-day${isDone?' done':''}${isToday?' today':''}">${i}</div>`;
  }
  cal.innerHTML = html;
}
// 初始化顶部打卡条
(function(){ const d = ciLoad(); ciSeconds = d.s; updateCheckinUI(); })();
